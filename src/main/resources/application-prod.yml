server:
  port: 8080

spring:
  datasource:
    url: jdbc:h2:file:./data/zhenduanqi
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: false
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    database-platform: org.hibernate.dialect.H2Dialect
    defer-datasource-initialization: true
    properties:
      hibernate:
        jdbc:
          time_zone: Asia/Shanghai
  sql:
    init:
      mode: always
      continue-on-error: true
      encoding: UTF-8

arthas:
  auth:
    jwt-secret: ${JWT_SECRET:change-this-secret-in-production-32chars}
    jwt-expiration-ms: ${JWT_EXPIRATION_MS:7200000}
  server:
    token-secret: ${TOKEN_SECRET:change-this-token-secret}

logging:
  level:
    root: WARN
    com.zhenduanqi: INFO
  file:
    name: ./logs/zhenduanqi.log
