server:
  port: 8207

spring:
  datasource:
    url: jdbc:h2:file:./data/zhenduanqi-issue-127
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    database-platform: org.hibernate.dialect.H2Dialect
    defer-datasource-initialization: true
    properties:
      hibernate:
        jdbc:
          time_zone: Asia/Shanghai
  sql:
    init:
      mode: always
      continue-on-error: true
      encoding: UTF-8

arthas:
  auth:
    jwt-secret: zhenduanqi-dev-secret-key-change-in-production-32chars
    jwt-expiration-ms: 7200000
  server:
    token-secret: zhenduanqi-token-secret-change-in-production

logging:
  level:
    root: ${LOGGING_LEVEL_ROOT:INFO}
    com.zhenduanqi: ${LOGGING_LEVEL_COM_ZHENDUANQI:DEBUG}
  file:
    name: ${LOGGING_FILE_NAME:./logs/zhenduanqi.log}

management:
  endpoints:
    web:
      exposure:
        include: loggers,health
  endpoint:
    loggers:
      enabled: true
      show-details: when_authorized
